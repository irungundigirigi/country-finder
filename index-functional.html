<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country search</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
      integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body class="body" style="background-color: wheat">
    <button id="togglecolor">Change color</button>
    <div>
      <h4>Search information about a country.</h4>
    </div>
    <div id="root"></div>
    <script type="text/babel">
      function Profile() {
        const [country, setCountry] = React.useState([]);
        const countryRef = React.useRef("");

        async function fetchData(e) {
          e.preventDefault();
          const data = await fetch(
            `https://restcountries.com/v3.1/name/${countryRef.current.value}`
          )
            .then((data) => data.json())
            .then((data) => console.log(data))
            .then((data) => setCountry(data));
        }
        return (
          <>
            <form>
              <label for="country"> Country Name </label>
              <input ref={countryRef} type="text" name="country"></input>
              <button onClick={fetchData}>Search</button>
            </form>
          </>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Profile />);
    </script>
    <script>
      $("#togglecolor").click(() => {
        $(".body").css("background-color", "teal");
      });
    </script>
  </body>
</html>
