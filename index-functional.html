<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReactCDN Functional App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
      integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body class="body" style="background-color: wheat">
    <div>
      <h4>
        This is a React CDN application. React, ReactDOM and babel are sourced
        from unpkg. The app implements a counter by React useState hook.
      </h4>
    </div>
    <div id="root"></div>
    <button id="togglecolor">Change color</button>
    <script type="text/babel">
      function Profile() {
        const [tasks, setTasks] = React.useState([]);
        const [number, setNumber] = React.useState(0);

        React.useEffect(() => {
          fetchData();
        }, []);

        function increment() {
          setNumber((prevCount) => prevCount + 1);
        }

        async function fetchData() {
          const data = await fetch("https://jsonplaceholder.typicode.com/todos")
            .then((data) => data.json())
            .then((data) => setTasks(data));
        }

        console.log(tasks);

        return (
          <>
            <h1>Hello number {number} world! </h1>
            <button onClick={increment}>Click me</button>
            <ul>
              {tasks.map((task) => (
                <li key={task.id}>
                  {task.title}
                  {task.completed}
                </li>
              ))}
            </ul>
          </>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      const element = <h1>Profile</h1>;
      root.render(<Profile />);
    </script>
    <script>
      $("#togglecolor").click(() => {
        $(".body").css("background-color", "teal");
      });
    </script>
  </body>
</html>
